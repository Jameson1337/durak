<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак Онлайн Mini App</title>
    <!-- Подключаем официальный проверенный скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1b4d3e;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .game-table {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border: 2px solid #143d31;
            margin: 10px;
            border-radius: 15px;
            background: radial-gradient(circle, #1f5c4a 0%, #143d31 100%);
            flex-wrap: wrap;
            padding: 10px;
        }
        .player-hand {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            background: rgba(0,0,0,0.1);
            min-height: 90px;
        }
        .card {
            background: white;
            color: black;
            border-radius: 8px;
            padding: 10px;
            width: 45px;
            height: 70px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
            user-select: none;
        }
        .card:active {
            transform: scale(0.95);
        }
        .red { color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-name">Загрузка игрока...</div>
        <div id="trump-info" style="margin-top: 5px; color: #ffd700;"></div>
    </div>

    <div class="game-table" id="table"></div>

    <div class="player-hand" id="hand"></div>

    <script>
        // Безопасная инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Отображение имени
        const userField = document.getElementById('user-name');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userField.innerText = `Игрок: ${tg.initDataUnsafe.user.first_name}`;
        } else {
            userField.innerText = "Игрок: Локальный тест";
        }

        // Параметры карт
        const suits = [
            { icon: '♠️', isRed: false },
            { icon: '♣️', isRed: false },
            { icon: '♥️', isRed: true },
            { icon: '♦️', isRed: true }
        ];
        const ranks = ['6', '7', '8', '9', '10', 'V', 'D', 'K', 'T'];

        // Случайный козырь
        const randomTrump = suits[Math.floor(Math.random() * suits.length)];
        document.getElementById('trump-info').innerText = `Козырь этой раздачи: ${randomTrump.icon}`;

        // Раздача карт
        function distributeCards() {
            const hand = document.getElementById('hand');
            hand.innerHTML = ''; 

            for (let i = 0; i < 6; i++) {
                const randomSuit = suits[Math.floor(Math.random() * suits.length)];
                const randomRank = ranks[Math.floor(Math.random() * ranks.length)];

                const card = document.createElement('div');
                card.className = 'card' + (randomSuit.isRed ? ' red' : '');
                card.innerHTML = `${randomSuit.icon}<br>${randomRank}`;
                
                card.onclick = function() { playCard(this); };
                hand.appendChild(card);
            }
        }

        // Логика хода
        function playCard(cardElement) {
            const table = document.getElementById('table');
            cardElement.onclick = null;
            table.appendChild(cardElement);
            
            // Запуск вибрации
            try {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
            } catch (e) {
                console.log("Вибрация не поддерживается");
            }
        }

        distributeCards();
    </script>
</body>
</html>
